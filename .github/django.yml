



name: Django Ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Dependencies install
        run: pip install -r requirements.txt
      
      - name: Tests chalao
        run: python manage.py test